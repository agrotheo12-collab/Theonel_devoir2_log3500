<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Atlas Mondial Interactif</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>

<body> 
  
  <!-- ===== En-tête ===== --> 
    <!-- ===== Barre de navigation ===== -->
     <nav>
      <div class="nav-links">

      <div class="logo"> 🌍 Atlas Mondial Interactif</div>
            <a href="#">Home</a>
            <a href="#" class="active">Countries</a>
            <a href="#">Regions</a>
            <a href="#">Map</a>
            <a href="#">About</a>

            <div class="search-box"> 🔍
          <input id="pays" type="text" placeholder="Search countries ...">
            </div>
            <a href="#">🌍</a>
        </div>
     </nav>

  <main>
     <section>
      <h1>Découvrir les pays du monde</h1> 
         <div class="page">
           <a class="back-link" id="resetLink" href="#">Back to Americas</a>
         </div>
  <!-- ===== Contenu principal ===== -->
         <div id="app">

           <div id="loader" class="loader-hidden">

         </div>
         <!-- Zone d'affichage des données -->
         <div id="data-container"></div>
  
        <!-- ===== C'est ici que JavaScript va afficher : le chargement, l'erreur, ou la carte ===== -->
         <div id="resultat"></div>
            <div class="state-box">
              <p> Type a country name and press Enter to start.</p>
            </div>
     </section>
  </main>

  <footer>
    <p>© 2026 - LOG3500 Devoir 2 - Atlas Mondial Interactif</p>
  </footer>
